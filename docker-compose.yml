services:
  kobo-sync:
    image: ghcr.io/adamratson/simple-kobo-sync-service:latest
    network_mode: host
    environment:
      KOBO_TOKEN: ${KOBO_TOKEN:?KOBO_TOKEN must be set}
      KOBO_EPUB_DIR: /data/epubs
      # KOBO_EXTERNAL_URL: http://192.168.1.50:8080  # optional: auto-detected via host networking
    volumes:
      - ${EPUB_DIR:-./epubs}:/data/epubs:ro
    restart: unless-stopped
